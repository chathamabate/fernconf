name: Test and Upload

on: 
  workflow_call:
    inputs:
      upload:
        required: false
        type: boolean
        default: false

jobs:
  test-and-package:
    name: Test and Package
    runs-on: ubuntu-latest
    steps:
      # NOTE: This requires repo code to be checked out!

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Setup Build Tools 
      run: |
        python -m pip install --upgrade pip
        python -m pip install --upgrade build

    - name: Download Dependencies
      run: pip install -e ".[test]"

    - name: Test
      run: pytest

    - name: Package
      run: python -m build

    - name: Upload Dist
      if: ${{ github.event_name == 'workflow_call' && inputs.upload }}
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
