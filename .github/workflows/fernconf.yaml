name: Publish

on:
  push:
    tags:
      - "v[0-9]+\\.[0-9]+\\.[0-9]+"

permissions:
  contents: write

jobs:
  upload:
    name: Upload
    uses: ./.github/workflows/test_and_package.yaml
    with:
      upload: true

  release:
    name: Github Release
    needs: upload
    runs-on: ubuntu-latest
    steps:
    - name: Download Dist
      uses: actions/download-artifact@v8
      with:
        name: dist
        path: dist/

    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        files: ./dist/*

  publish:
    name: PyPI Publish
    needs: upload
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
    - name: Download Dist
      uses: actions/download-artifact@v8
      with:
        name: dist
        path: dist/

    - name: Publish package to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
