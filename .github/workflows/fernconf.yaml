name: Build and Publish

jobs:
  deploy:
    name: Publish
    #needs: build-and-test
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}
    permissions:
      id-token: write

    steps:
    - name: Download Dist
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/

